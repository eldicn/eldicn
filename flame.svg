<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="800" height="140">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="800" height="140" rx="12" fill="#141210"/>
  <rect width="800" height="140" rx="12" fill="none" stroke="#2e2820" stroke-width="1"/>

  <!-- glow under fire -->
  <ellipse cx="72" cy="100" rx="36" ry="14" fill="#c47b2b" opacity="0.25">
    <animate attributeName="opacity" values="0.15;0.32;0.15" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="32;40;32" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- flame back -->
  <path d="M64 92 Q54 72 62 52 Q70 38 68 54 Q78 40 74 58 Q82 46 78 62 Q84 54 80 68 Q76 80 72 88Z"
        fill="#b05a10" opacity="0.6">
    <animateTransform attributeName="transform" type="skewX"
      values="0;3;-2;1;0" dur="2.0s" repeatCount="indefinite"
      additive="sum"/>
    <animate attributeName="opacity" values="0.5;0.7;0.5" dur="2.0s" repeatCount="indefinite"/>
  </path>

  <!-- flame mid -->
  <path d="M65 92 Q57 74 63 56 Q70 44 69 58 Q77 46 74 62 Q80 52 77 66 Q74 78 72 88Z"
        fill="#e8a45a" opacity="0.8">
    <animateTransform attributeName="transform" type="skewX"
      values="0;-3;2;-1;0" dur="1.6s" repeatCount="indefinite"
      additive="sum"/>
    <animate attributeName="opacity" values="0.7;0.9;0.7" dur="1.6s" repeatCount="indefinite"/>
  </path>

  <!-- flame front -->
  <path d="M67 91 Q61 76 65 62 Q70 52 70 64 Q75 55 73 67 Q77 60 75 72 Q73 82 72 88Z"
        fill="#f5d09a" opacity="0.7">
    <animateTransform attributeName="transform" type="skewX"
      values="0;2;-2;0" dur="1.2s" repeatCount="indefinite"
      additive="sum"/>
    <animate attributeName="opacity" values="0.6;0.8;0.6" dur="1.2s" repeatCount="indefinite"/>
  </path>

  <!-- spark 1 -->
  <circle cx="66" cy="52" r="1.3" fill="#f5d09a">
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="52;20;20" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="66;70;70" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- spark 2 -->
  <circle cx="78" cy="46" r="1.0" fill="#e8a45a">
    <animate attributeName="opacity" values="0;0;0.9;0.9;0" dur="3.2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="46;46;14;14" dur="3.2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="78;78;74;74" dur="3.2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- spark 3 -->
  <circle cx="60" cy="48" r="0.9" fill="#f5d09a">
    <animate attributeName="opacity" values="0;0;0.8;0" dur="2.5s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="48;48;18" dur="2.5s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="60;60;56" dur="2.5s" begin="1.1s" repeatCount="indefinite"/>
  </circle>

  <!-- spark 4 -->
  <circle cx="80" cy="54" r="1.1" fill="#e8a45a">
    <animate attributeName="opacity" values="0;0.9;0" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="54;22" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="80;84" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>

  <!-- rocks -->
  <ellipse cx="72" cy="98" rx="24" ry="7"  fill="#2e2820"/>
  <ellipse cx="56" cy="100" rx="9" ry="5"  fill="#3a3228"/>
  <ellipse cx="72" cy="101" rx="7" ry="4"  fill="#28231a"/>
  <ellipse cx="88" cy="100" rx="9" ry="5"  fill="#3a3228"/>

  <!-- wordmark Eld -->
  <text x="136" y="82"
    font-family="Georgia, serif"
    font-size="56" font-weight="700" letter-spacing="4"
    fill="#f0e8d8">Eld</text>

  <!-- wordmark icn (dimmed) -->
  <text x="252" y="82"
    font-family="Georgia, serif"
    font-size="56" font-weight="700" letter-spacing="4"
    fill="#e8a45a" opacity="0.45">icn</text>

  <!-- divider line -->
  <line x1="136" y1="95" x2="500" y2="95" stroke="#2e2820" stroke-width="1"/>

  <!-- tagline -->
  <text x="136" y="116"
    font-family="Georgia, serif"
    font-size="13" font-style="italic"
    fill="#c4b090">Ancient flame, carried forward.</text>
</svg>
